<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Warm the connection to the image CDN early: the LCP hero is an Unsplash
         photo, so saving DNS+TCP+TLS setup shaves real time off first paint,
         especially from slow in-app browsers (TikTok/IG). No crossorigin —
         images are fetched no-CORS as background-image/<img>. -->
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />
    <!--OG:START-->

    <!-- Fonts are self-hosted (see main.tsx); no render-blocking Google Fonts link. -->
 <!-- Google tag (gtag.js) — deferred. The library is ~155KB and was loading
         in the <head>, competing with the bundle/CSS for the critical window and
         pushing out LCP. We keep the dataLayer stub inline (so early gtag() calls
         queue) and only fetch the library once the page is loaded + idle. -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XJC8RN21Z6');
      (function () {
        var loaded = false;
        function loadGtag(){
          if (loaded) return; loaded = true;
          var s = document.createElement('script');
          s.async = true;
          s.src = 'https://www.googletagmanager.com/gtag/js?id=G-XJC8RN21Z6';
          document.head.appendChild(s);
        }
        function schedule(){
          if ('requestIdleCallback' in window) requestIdleCallback(loadGtag, { timeout: 3000 });
          else setTimeout(loadGtag, 1500);
        }
        if (document.readyState === 'complete') schedule();
        else window.addEventListener('load', schedule, { once: true });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
