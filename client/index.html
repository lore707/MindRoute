<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Warm the connection to the image CDN early: the LCP hero is an Unsplash
         photo, so saving DNS+TCP+TLS setup shaves real time off first paint,
         especially from slow in-app browsers (TikTok/IG). No crossorigin —
         images are fetched no-CORS as background-image/<img>. -->
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />
    <!-- Prerendered hero: the first hero photo is known at build time, so we
         preload it at high priority. Same URL the React landing requests on
         mobile (w=900,q=70) → one fetch, served from cache when React mounts. -->
    <link rel="preload" as="image" fetchpriority="high"
      href="https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?w=900&fit=crop&crop=entropy&auto=format&q=70" />
    <!-- Critical CSS for the static hero shell (#pre-hero). Inlined so it paints
         with zero extra requests, before the JS bundle/stylesheet load. -->
    <style>
      #pre-hero{position:fixed;inset:0;z-index:2147483000;display:flex;flex-direction:column;
        justify-content:center;background:#0b0c11;overflow:hidden;
        transition:opacity .6s ease}
      #pre-hero.ph-hide{opacity:0;pointer-events:none}
      #pre-hero .ph-photo{position:absolute;inset:0;background-size:cover;background-position:center 35%;
        background-image:url("https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?w=900&fit=crop&crop=entropy&auto=format&q=70")}
      /* Stesse veil del nuovo hero (.led-hero-bg::after) così il crossfade
         pre-hero → React è invisibile. */
      #pre-hero .ph-veil{position:absolute;inset:0;background:
        linear-gradient(90deg,rgba(11,12,17,.88) 0%,rgba(11,12,17,.55) 45%,rgba(11,12,17,.25) 100%),
        linear-gradient(180deg,rgba(11,12,17,.55) 0%,rgba(11,12,17,.05) 30%,rgba(11,12,17,.92) 100%)}
      #pre-hero .ph-in{position:relative;z-index:2;width:100%;max-width:1240px;margin:0 auto;padding:0 40px}
      #pre-hero .ph-title{font-family:"Playfair Display",Georgia,serif;font-weight:400;color:#fff;
        font-size:clamp(46px,7vw,96px);line-height:1.0;letter-spacing:-.02em;margin:0 0 26px;
        text-shadow:0 4px 32px rgba(0,0,0,.45)}
      #pre-hero .ph-title i{color:#f0435a;font-style:italic}
      #pre-hero .ph-tag{color:rgba(255,255,255,.85);
        font-size:clamp(16px,1.5vw,19px);line-height:1.55;max-width:520px;margin:0;text-shadow:0 2px 16px rgba(0,0,0,.4)}
      @media (max-width:768px){
        #pre-hero .ph-in{padding:0 20px}
        #pre-hero .ph-title{font-size:clamp(40px,11vw,58px);line-height:1.0;margin-bottom:16px}
        #pre-hero .ph-tag{font-size:15px;max-width:none}
      }
      @media (prefers-reduced-motion:reduce){#pre-hero{transition:none}}
    </style>
    <!--OG:START-->
    <title>MindRoute — Travel starts with who you are</title>
    <meta name="description" content="Answer a short quiz and get a day-by-day trip designed around who you are. MindRoute — travel starts with who you are." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="MindRoute" />
    <meta property="og:title" content="MindRoute — Travel starts with who you are" />
    <meta property="og:description" content="Answer a short quiz and get a day-by-day trip designed around who you are." />
    <meta property="og:image" content="https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=1200&h=630&fit=crop" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="MindRoute — Travel starts with who you are" />
    <meta name="twitter:description" content="Answer a short quiz and get a day-by-day trip designed around who you are." />
    <meta name="twitter:image" content="https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=1200&h=630&fit=crop" />
    <!--OG:END-->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg viewBox='0 0 120 120' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M60 52C60 52 42 32 28 36C14 40 12 56 24 62C36 68 60 60 60 60' fill='%23E94560' opacity='0.85'/%3E%3Cpath d='M60 60C60 60 38 72 30 82C22 92 30 100 40 96C50 92 60 72 60 72' fill='%23E94560' opacity='0.55'/%3E%3Cpath d='M60 52C60 52 78 32 92 36C106 40 108 56 96 62C84 68 60 60 60 60' fill='%23E94560' opacity='0.85'/%3E%3Cpath d='M60 60C60 60 82 72 90 82C98 92 90 100 80 96C70 92 60 72 60 72' fill='%23E94560' opacity='0.55'/%3E%3Cellipse cx='60' cy='60' rx='5' ry='6' fill='%231A1A2E'/%3E%3Cpath d='M58 66L60 108L62 66' fill='%23E94560' opacity='0.7'/%3E%3Ccircle cx='60' cy='48' r='3.5' fill='%231A1A2E'/%3E%3Ccircle cx='42' cy='50' r='4' fill='white' opacity='0.2'/%3E%3Ccircle cx='78' cy='50' r='4' fill='white' opacity='0.2'/%3E%3Ccircle cx='44' cy='82' r='3' fill='white' opacity='0.15'/%3E%3Ccircle cx='76' cy='82' r='3' fill='white' opacity='0.15'/%3E%3C/svg%3E" />
    <!-- Fonts are self-hosted (see main.tsx); no render-blocking Google Fonts link. -->
 <!-- Google tag (gtag.js) — deferred. The library is ~155KB and was loading
         in the <head>, competing with the bundle/CSS for the critical window and
         pushing out LCP. We keep the dataLayer stub inline (so early gtag() calls
         queue) and only fetch the library once the page is loaded + idle. -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      // Consent Mode v2: default NEGATO finché l'utente non accetta il cookie
      // banner (GDPR). Deve stare PRIMA di gtag('config'). Se il consenso era
      // già stato dato in una visita precedente, lo ripristiniamo subito.
      gtag('consent', 'default', { analytics_storage: 'denied', ad_storage: 'denied', ad_user_data: 'denied', ad_personalization: 'denied' });
      try {
        if (localStorage.getItem('mindroute_cookie_consent') === 'accepted') {
          gtag('consent', 'update', { analytics_storage: 'granted' });
        }
      } catch (e) { /* private mode */ }
      gtag('js', new Date());
      gtag('config', 'G-XJC8RN21Z6');
      (function () {
        var loaded = false;
        function loadGtag(){
          if (loaded) return; loaded = true;
          var s = document.createElement('script');
          s.async = true;
          s.src = 'https://www.googletagmanager.com/gtag/js?id=G-XJC8RN21Z6';
          document.head.appendChild(s);
        }
        function schedule(){
          if ('requestIdleCallback' in window) requestIdleCallback(loadGtag, { timeout: 3000 });
          else setTimeout(loadGtag, 1500);
        }
        if (document.readyState === 'complete') schedule();
        else window.addEventListener('load', schedule, { once: true });
      })();
    </script>
  </head>
  <body>
    <!-- Static hero shell: paints the LCP image + headline instantly, before the
         JS bundle runs. React renders the real landing into #root underneath and
         then fades this away (see main.tsx). Only relevant on the home route. -->
    <div id="pre-hero" aria-hidden="true">
      <div class="ph-photo"></div>
      <div class="ph-veil"></div>
      <div class="ph-in">
        <h1 class="ph-title">Travel starts with<br /><i>who you are.</i></h1>
        <p class="ph-tag">Answer 4 questions. Get 3 destinations chosen for your personality, with a complete itinerary ready to book.</p>
      </div>
    </div>
    <script>
      // The shell only makes sense on the ANONYMOUS landing ("/"). On any other
      // route (deep links, dashboard) — or when the last known session was
      // logged-in (the "/" will mount the dashboard, not the landing) — drop it
      // before paint so the marketing hero never flashes.
      (function () {
        var authed = false;
        try { authed = localStorage.getItem('mr_auth') === '1'; } catch (e) {}
        if (location.pathname !== '/' || authed) {
          var ph = document.getElementById('pre-hero');
          if (ph) ph.remove();
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
