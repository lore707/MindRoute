<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindRoute — Profiling</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg viewBox='0 0 120 120' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M60 52C60 52 42 32 28 36C14 40 12 56 24 62C36 68 60 60 60 60' fill='%23E94560' opacity='0.85'/%3E%3Cpath d='M60 60C60 60 38 72 30 82C22 92 30 100 40 96C50 92 60 72 60 72' fill='%23E94560' opacity='0.55'/%3E%3Cpath d='M60 52C60 52 78 32 92 36C106 40 108 56 96 62C84 68 60 60 60 60' fill='%23E94560' opacity='0.85'/%3E%3Cpath d='M60 60C60 60 82 72 90 82C98 92 90 100 80 96C70 92 60 72 60 72' fill='%23E94560' opacity='0.55'/%3E%3Cellipse cx='60' cy='60' rx='5' ry='6' fill='%231A1A2E'/%3E%3Cpath d='M58 66L60 108L62 66' fill='%23E94560' opacity='0.7'/%3E%3Ccircle cx='60' cy='48' r='3.5' fill='%231A1A2E'/%3E%3C/svg%3E">
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap');
:root{--bg:#FAFAF8;--bg-alt:#F3F1EE;--text:#1A1A2E;--text-secondary:#6B6776;--text-hint:#A09BA8;--accent:#E94560;--accent-hover:#D13A52;--accent-soft:rgba(233,69,96,.07);--accent-glow:rgba(233,69,96,.15);--card-bg:#fff;--border:#EDEBE8}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}

nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:16px 32px;display:flex;align-items:center;justify-content:space-between;background:rgba(250,250,248,.92);backdrop-filter:blur(16px);border-bottom:1px solid rgba(237,235,232,.5)}
.nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--text)}
.nav-logo{width:30px;height:30px}
.nav-name{font-family:'DM Serif Display',serif;font-size:18px}
.nav-exit{font-size:13px;color:var(--text-secondary);padding:7px 16px;border:1px solid var(--border);border-radius:100px;transition:all .2s;background:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif}
.nav-exit:hover{border-color:var(--accent);color:var(--accent)}

.top-pbar{position:fixed;top:56px;left:0;right:0;z-index:99;display:flex;align-items:center;justify-content:center;gap:5px;padding:12px 24px;background:rgba(250,250,248,.95);backdrop-filter:blur(12px);border-bottom:1px solid rgba(237,235,232,.3)}
.tp-seg{height:4px;flex:1;max-width:40px;border-radius:2px;background:var(--border);transition:all .5s cubic-bezier(.4,0,.2,1)}
.tp-seg.filled{background:var(--accent)}
.tp-seg.current{background:var(--accent);box-shadow:0 0 8px rgba(233,69,96,.25)}
.tp-sep{width:1px;height:12px;background:var(--border);margin:0 4px}
.tp-count{font-size:12px;color:var(--text-hint);font-weight:500;margin-left:8px;min-width:32px}

.layout{display:grid;grid-template-columns:72px 1fr 300px;min-height:100vh;padding-top:85px}
.vp{padding:40px 0;display:flex;flex-direction:column;align-items:center;position:sticky;top:85px;height:calc(100vh - 85px);justify-content:center;overflow-y:auto}
.vp-step{display:flex;flex-direction:column;align-items:center;cursor:pointer;position:relative}
.vp-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;transition:all .45s cubic-bezier(.4,0,.2,1);z-index:2;position:relative}
.vp-dot.active{background:var(--accent);color:white;transform:scale(1.15);box-shadow:0 4px 20px var(--accent-glow)}
.vp-dot.active::after{content:'';position:absolute;inset:-5px;border-radius:50%;border:2px solid var(--accent);opacity:.2;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.2}50%{transform:scale(1.2);opacity:0}}
.vp-dot.done{background:var(--accent);color:white;opacity:.55}
.vp-dot.done:hover{opacity:.85;transform:scale(1.05)}
.vp-dot.wait{background:var(--bg-alt);color:var(--text-hint);border:1.5px solid var(--border)}
.vp-line{width:2px;height:18px;background:var(--border);transition:all .5s ease;border-radius:1px}
.vp-line.filled{background:var(--accent);opacity:.35}

.main{padding:48px 56px 140px;max-width:740px;position:relative}
.qc{position:relative;z-index:2}
.qc.enter{animation:qIn .55s cubic-bezier(.22,1,.36,1) forwards}
.qc.exit{animation:qOut .28s ease-in forwards}
@keyframes qIn{from{opacity:0;transform:translateY(32px) scale(.97);filter:blur(6px)}to{opacity:1;transform:none;filter:blur(0)}}
@keyframes qOut{from{opacity:1;transform:none}to{opacity:0;transform:translateY(-18px) scale(.98)}}

.q-label{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--accent);margin-bottom:22px;padding:5px 14px;background:var(--accent-soft);border-radius:100px}
.q-label svg{width:12px;height:12px}
.q-text{font-family:'DM Serif Display',serif;font-size:clamp(24px,3.5vw,34px);line-height:1.3;letter-spacing:-.5px;margin-bottom:12px}
.q-text em{font-style:italic;color:var(--accent)}
.q-hint{font-size:14px;color:var(--text-secondary);font-weight:300;font-style:italic;line-height:1.7;margin-bottom:32px}

.q-ta{width:100%;min-height:140px;padding:20px 22px;font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;line-height:1.8;color:var(--text);background:var(--card-bg);border:1.5px solid var(--border);border-radius:16px;resize:vertical;outline:none;transition:all .35s ease;box-shadow:0 2px 16px rgba(26,26,46,.03)}
.q-ta::placeholder{color:var(--text-hint);font-weight:300}
.q-ta:focus{border-color:var(--accent);box-shadow:0 6px 32px rgba(233,69,96,.08),0 0 0 4px rgba(233,69,96,.04)}
.ta-f{display:flex;justify-content:space-between;margin-top:8px;font-size:12px;color:var(--text-hint)}

.chips{display:flex;flex-wrap:wrap;gap:9px}
.chip{padding:12px 22px;border:1.5px solid var(--border);border-radius:100px;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:400;color:var(--text-secondary);background:var(--card-bg);cursor:pointer;transition:all .3s cubic-bezier(.25,.46,.45,.94);user-select:none}
.chip:hover{border-color:var(--accent);color:var(--text);transform:translateY(-2px);box-shadow:0 4px 16px rgba(233,69,96,.08)}
.chip.on{border-color:var(--accent);background:var(--accent);color:white;font-weight:500;box-shadow:0 4px 20px var(--accent-glow);transform:scale(1.02)}
.chip-add{width:100%;margin-top:0;padding:14px 18px;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;line-height:1.6;color:var(--text);background:var(--card-bg);border:1.5px solid var(--border);border-radius:12px;resize:none;outline:none;min-height:55px;opacity:0;max-height:0;overflow:hidden;transition:all .5s cubic-bezier(.4,0,.2,1)}
.chip-add.vis{opacity:1;max-height:100px;margin-top:14px}
.chip-add::placeholder{color:var(--text-hint);font-weight:300;font-style:italic}
.chip-add:focus{border-color:var(--accent)}

.imgs{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.iopt{position:relative;border-radius:18px;overflow:hidden;cursor:pointer;border:3px solid transparent;transition:all .4s cubic-bezier(.25,.46,.45,.94);box-shadow:0 4px 24px rgba(26,26,46,.07)}
.iopt-bg{width:100%;height:195px;display:block;object-fit:cover;transition:transform .6s cubic-bezier(.25,.46,.45,.94),filter .4s ease}
.iopt::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 30%,rgba(0,0,0,.5));pointer-events:none}
.iopt:hover .iopt-bg{transform:scale(1.06);filter:brightness(1.08) saturate(1.1)}
.iopt:hover{border-color:rgba(233,69,96,.35);box-shadow:0 14px 48px rgba(26,26,46,.14);transform:translateY(-4px)}
.iopt.on{border-color:var(--accent);box-shadow:0 8px 40px var(--accent-glow)}
.iopt.on::after{background:linear-gradient(180deg,rgba(233,69,96,.06) 0%,rgba(233,69,96,.22) 100%)}
.iopt-label{position:absolute;bottom:0;left:0;right:0;padding:14px 16px;color:white;font-size:13px;font-weight:500;z-index:2}
.iopt-label small{display:block;font-size:11px;font-weight:300;opacity:.75;margin-top:2px}
.iopt-check{position:absolute;top:12px;right:12px;width:30px;height:30px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;opacity:0;transform:scale(.3) rotate(-45deg);transition:all .4s cubic-bezier(.34,1.56,.64,1);box-shadow:0 4px 16px rgba(233,69,96,.35);z-index:3}
.iopt.on .iopt-check{opacity:1;transform:scale(1) rotate(0)}
.iopt-check svg{width:14px;height:14px}
.img-counter{text-align:center;margin-top:12px;font-size:13px;color:var(--text-hint)}
.img-counter span{color:var(--accent);font-weight:600}

.sl-box{background:var(--card-bg);border:1.5px solid var(--border);border-radius:18px;padding:32px 28px}
.sl-labels{display:flex;justify-content:space-between;margin-bottom:28px}
.sl-label{font-size:12px;color:var(--text-secondary);font-weight:400;max-width:130px;line-height:1.4}
.sl-track{position:relative;width:100%;height:6px;background:var(--bg-alt);border-radius:3px;cursor:pointer}
.sl-fill{position:absolute;left:0;top:0;height:100%;background:linear-gradient(90deg,var(--accent),#F06B83);border-radius:3px;transition:width .15s ease}
.sl-thumb{position:absolute;top:50%;transform:translate(-50%,-50%);width:28px;height:28px;background:white;border:3px solid var(--accent);border-radius:50%;cursor:grab;transition:box-shadow .2s,transform .15s;z-index:2}
.sl-thumb:hover{box-shadow:0 0 0 12px rgba(233,69,96,.08)}
.sl-thumb:active{cursor:grabbing;transform:translate(-50%,-50%) scale(1.15);box-shadow:0 0 0 18px rgba(233,69,96,.1)}
.sl-notches{display:flex;justify-content:space-between;margin-top:10px;padding:0 4px}
.sl-notch{width:2px;height:8px;background:var(--border);border-radius:1px;transition:background .3s}
.sl-notch.on{background:var(--accent)}
.sl-val{text-align:center;margin-top:18px;font-family:'DM Serif Display',serif;font-size:15px;color:var(--accent);font-style:italic}

/* TEXT INPUT (short, for city etc) */
.q-input{width:100%;padding:16px 20px;font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;color:var(--text);background:var(--card-bg);border:1.5px solid var(--border);border-radius:12px;outline:none;transition:all .3s ease}
.q-input::placeholder{color:var(--text-hint);font-weight:300}
.q-input:focus{border-color:var(--accent);box-shadow:0 4px 20px rgba(233,69,96,.06)}

/* SPLIT SCREEN */
.split{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:8px}
.split-card{background:var(--card-bg);border:2px solid var(--border);border-radius:20px;padding:40px 28px;text-align:center;cursor:pointer;transition:all .4s cubic-bezier(.25,.46,.45,.94);position:relative;overflow:hidden}
.split-card:hover{border-color:var(--accent);transform:translateY(-4px);box-shadow:0 16px 48px rgba(233,69,96,.1)}
.split-card.on{border-color:var(--accent);background:linear-gradient(135deg,rgba(233,69,96,.03),rgba(233,69,96,.08))}
.split-icon{width:56px;height:56px;border-radius:50%;background:var(--accent-soft);display:flex;align-items:center;justify-content:center;margin:0 auto 18px}
.split-icon svg{width:26px;height:26px}
.split-card h3{font-family:'DM Serif Display',serif;font-size:20px;margin-bottom:8px}
.split-card p{font-size:13px;color:var(--text-secondary);font-weight:300;line-height:1.6}

/* CONDITIONAL SUB-QUESTION */
.sub-q{margin-top:24px;padding:20px;background:var(--bg-alt);border-radius:14px;animation:subIn .4s ease}
@keyframes subIn{from{opacity:0;max-height:0;margin-top:0;padding:0 20px}to{opacity:1;max-height:400px;margin-top:24px;padding:20px}}
.sub-q-label{font-size:12px;font-weight:600;color:var(--accent);margin-bottom:12px}

.btns{display:flex;align-items:center;justify-content:space-between;margin-top:36px}
.btn-b{display:inline-flex;align-items:center;gap:6px;font-size:14px;color:var(--text-secondary);background:none;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;padding:10px 16px;border-radius:8px;transition:all .2s}
.btn-b:hover{color:var(--text);background:var(--bg-alt)}
.btn-b svg{width:16px;height:16px}
.btn-n{display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:white;font-size:15px;font-weight:600;padding:14px 32px;border-radius:100px;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .3s;box-shadow:0 4px 20px rgba(233,69,96,.2)}
.btn-n:hover{background:var(--accent-hover);transform:translateY(-2px);box-shadow:0 8px 32px rgba(233,69,96,.3)}
.btn-n:disabled{background:#CCC;box-shadow:none;cursor:not-allowed;transform:none}
.btn-n svg{width:16px;height:16px;transition:transform .2s}
.btn-n:hover:not(:disabled) svg{transform:translateX(4px)}

.micro{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'DM Serif Display',serif;font-size:34px;font-style:italic;color:var(--accent);opacity:0;pointer-events:none;z-index:200}
.micro.go{animation:mp 1s ease-out forwards}
@keyframes mp{0%{opacity:0;transform:translate(-50%,-50%) scale(.7);filter:blur(6px)}18%{opacity:1;transform:translate(-50%,-50%) scale(1.05);filter:blur(0)}72%{opacity:1}100%{opacity:0;transform:translate(-50%,-46%) scale(1)}}

.side{padding:48px 28px 48px 0;position:sticky;top:85px;height:calc(100vh - 85px);display:flex;flex-direction:column;gap:14px;justify-content:center;overflow-y:auto}
.sc{background:var(--card-bg);border:1px solid var(--border);border-radius:16px;padding:18px;transition:all .4s ease;animation:si .5s ease .15s both}
.sc:nth-child(2){animation-delay:.25s}
@keyframes si{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:translateX(0)}}
.sc-h{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:13px;font-weight:600;color:var(--text)}
.sc-h svg{width:15px;height:15px;flex-shrink:0}
.sc p{font-size:12px;color:var(--text-secondary);line-height:1.7;font-weight:300}
.mt{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.mt span{font-size:10px;padding:3px 10px;border-radius:100px;background:var(--accent-soft);color:var(--accent);font-weight:600}
.sb-priv{display:flex;align-items:flex-start;gap:8px;padding:12px;background:var(--bg-alt);border-radius:12px;font-size:11px;color:var(--text-hint);line-height:1.5;animation:si .5s ease .35s both}

/* Phase label */
.phase-tag{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-hint);margin-bottom:6px}

.analyze-overlay{position:fixed;inset:0;z-index:300;background:var(--bg);display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:opacity .5s ease,visibility .5s ease}
.analyze-overlay.show{opacity:1;visibility:visible}
.analyze-box{text-align:center;max-width:440px;padding:0 24px}
.analyze-box h2{font-family:'DM Serif Display',serif;font-size:28px;line-height:1.3;margin-bottom:20px}
.analyze-box h2 em{color:var(--accent);font-style:italic}
.analyze-dots{display:flex;gap:8px;justify-content:center;margin-bottom:24px}
.analyze-dot{width:10px;height:10px;border-radius:50%;background:var(--accent);animation:anDot 1.4s ease-in-out infinite}
.analyze-dot:nth-child(2){animation-delay:.2s}
.analyze-dot:nth-child(3){animation-delay:.4s}
@keyframes anDot{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1.2)}}
.analyze-traits{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:20px}
.analyze-trait{font-size:12px;padding:5px 14px;border-radius:100px;background:var(--accent-soft);color:var(--accent);font-weight:500;opacity:0;animation:traitIn .4s ease forwards}
@keyframes traitIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.kb{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-hint);opacity:.35;z-index:50}
.kk{display:inline-flex;padding:3px 8px;background:var(--card-bg);border:1px solid var(--border);border-radius:4px;font-size:11px;font-weight:600;color:var(--text-secondary)}

@media(max-width:1024px){.layout{grid-template-columns:1fr}.vp,.side{display:none}.main{padding:36px 20px 120px;max-width:100%}}
@media(max-width:640px){.imgs{gap:10px}.iopt-bg{height:160px}.split{grid-template-columns:1fr;gap:14px}.split-card{padding:28px 22px}}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-brand"><svg class="nav-logo" viewBox="0 0 120 120" fill="none"><path d="M60 52C60 52 42 32 28 36C14 40 12 56 24 62C36 68 60 60 60 60" fill="#E94560" opacity="0.85"/><path d="M60 60C60 60 38 72 30 82C22 92 30 100 40 96C50 92 60 72 60 72" fill="#E94560" opacity="0.55"/><path d="M60 52C60 52 78 32 92 36C106 40 108 56 96 62C84 68 60 60 60 60" fill="#E94560" opacity="0.85"/><path d="M60 60C60 60 82 72 90 82C98 92 90 100 80 96C70 92 60 72 60 72" fill="#E94560" opacity="0.55"/><ellipse cx="60" cy="60" rx="5" ry="6" fill="#1A1A2E"/><path d="M58 66L60 108L62 66" fill="#E94560" opacity="0.7"/><circle cx="60" cy="48" r="3.5" fill="#1A1A2E"/></svg><span class="nav-name">MindRoute</span></a>
  <div style="width:80px"></div>
  <button class="nav-exit" onclick="location.href='index.html'">Save & exit</button>
</nav>
<div class="top-pbar" id="topBar"></div>
<div class="micro" id="mic"></div>
<div class="analyze-overlay" id="analyzeOverlay">
  <div class="analyze-box">
    <h2>Analyzing your <em>travel soul...</em></h2>
    <div class="analyze-dots"><div class="analyze-dot"></div><div class="analyze-dot"></div><div class="analyze-dot"></div></div>
    <div class="analyze-traits" id="analyzeTraits"></div>
  </div>
</div>

<div class="layout">
  <div class="vp" id="vp"></div>
  <div class="main"><div id="qA"></div></div>
  <div class="side" id="sb"></div>
</div>
<div class="kb">Press <span class="kk">Enter</span> to continue</div>

<script>
// === QUESTION DEFINITIONS ===
// Each question: {id, phase, t(title), h(hint), ty(type), opts, multi, max, imgs, slLabels, slVals, w(why), tg(tags), cond(conditional fn)}
// Types: split, text, chips, images, slider, input
// phase: 'split','1a','1b','style','practical','context'

const IMGS_A = [
  {l:'Ancient medina alley',sub:'Warm stone · spice · labyrinth',v:'medina',img:'https://images.unsplash.com/photo-1553244424-d767f10e0130?w=600&q=85'},
  {l:'Nordic cliffs & silence',sub:'Cold air · vast sky · stillness',v:'nordic',img:'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=600&q=85'},
  {l:'Temple at dusk',sub:'Incense · gold light · ritual',v:'temple',img:'https://images.unsplash.com/photo-1528360983277-13d401cdc186?w=600&q=85'},
  {l:'Empty desert road',sub:'Heat · solitude · infinity',v:'desert',img:'https://images.unsplash.com/photo-1509316785289-025f5b846b35?w=600&q=85'}
];
const IMGS_B = [
  {l:'Seaside terrace at sunset',sub:'Aperitivo · warmth · horizon',v:'seaside',img:'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=600&q=85'},
  {l:'Chaotic colorful market',sub:'Energy · spice · voices',v:'market',img:'https://images.unsplash.com/photo-1518105779142-d975f22f1b0a?w=600&q=85'},
  {l:'Mountain trail at dawn',sub:'Effort · reward · silence',v:'trail',img:'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=600&q=85'},
  {l:'European café, rainy day',sub:'Book · coffee · slowness',v:'cafe',img:'https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=600&q=85'}
];

const SL_RHYTHM = ['Intense — full days, miss nothing','Active — busy morning, easy afternoon','Balanced — 2-3 things with real breaks','Relaxed — one main thing, rest is flow','Slow — no plan, wake up and see'];

const DRAINS = ['Guided group tours','Crowded tourist spots','Museums on repeat','Resorts & tourist villages','Nightlife & clubs','Tourist-trap restaurants','Long transfers','Forced early mornings','Rigid schedules','Forced small talk','Unfamiliar food','Too much walking','Staying too long in one place','Too isolated / far from everything','Spending without clear value'];

const ALL_Q = {
  // === SPLIT ===
  split: {id:'split',phase:'split',t:'How do you want to <em>start?</em>',h:'',ty:'split',w:'This choice itself is a signal — openness vs direction.',tg:['path','intention']},

  // === PATH A ===
  a1:{id:'a1',phase:'1a',t:'Which of these <em>pulls you in?</em>',h:"Don't think. Just feel.",ty:'images',imgs:IMGS_A,max:2,w:'Visual attraction bypasses rational filters. The image you choose reveals your aesthetic soul.',tg:['aesthetic','climate','subconscious']},

  // === PATH B ===
  b1:{id:'b1',phase:'1b',t:'Where do you want to <em>go?</em>',h:'',ty:'chips',opts:['Close to home','Europe','Asia','Americas','Africa & Middle East','Oceania'],w:'Hard geographic constraint — the starting point for everything.',tg:['geography','constraint']},
  b2:{id:'b2',phase:'1b',t:'What <em>type</em> of trip?',h:'Pick up to 3.',ty:'chips',opts:['Culture & history','Nature & adventure','Food & wine','Beach & relax','City & nightlife','Off-the-grid','Road trip','Trekking & sports','Wellness & spa','Discovery (surprise me within the area)'],multi:true,max:3,w:'The combination reveals more than individual choices.',tg:['trip type','category']},
  b3:{id:'b3',phase:'1b',t:'Anything <em>specific</em> you want to do or see?',h:'Leave blank if you want us to guide you.',ty:'text',ph:'E.g. northern Vietnam, temples of Angkor, Iceland road trip...',optional:true,w:'The level of specificity reveals travel experience and intent.',tg:['specific desire','experience level']},
  b4:{id:'b4',phase:'1b',t:'What should this trip make you <em>feel?</em>',h:'Pick up to 2.',ty:'chips',opts:['Recharged','Inspired','Free','At peace','Alive','Connected','Out of my comfort zone','Pampered'],multi:true,max:2,w:'Quick emotional signal — calibrates intensity and tone of the itinerary.',tg:['emotional need','tone']},
  b5:{id:'b5',phase:'1b',t:'What <em>atmosphere</em> are you looking for?',h:'',ty:'images',imgs:IMGS_B,max:2,w:'Even practical travelers reveal their aesthetic soul here.',tg:['aesthetic','atmosphere']},
  b6:{id:'b6',phase:'1b',t:'Anything you want to <em>avoid?</em>',h:'Quick — so we don\'t suggest things you hate.',ty:'chips',opts:DRAINS.slice(0,10),multi:true,w:'Negative filters for the itinerary.',tg:['anti-patterns','quick filter']},

  // === STYLE (common) ===
  s1:{id:'s1',phase:'style',t:'What <em>rhythm</em> for your days?',h:'',ty:'slider',slLabels:['Full days, miss nothing','Wake up and see'],slVals:SL_RHYTHM,w:'Rhythm reveals your relationship with control and rest.',tg:['rhythm','control','pace']},
  s2:{id:'s2',phase:'style',t:'How much <em>physical effort</em> are you up for?',h:'',ty:'chips',opts:['Low — comfort & easy transport','Normal — happy to walk, nothing extreme','High — love walking for hours, exploring on foot','Extreme — serious trekking, intense activities'],w:'Physical threshold shapes every activity suggestion.',tg:['physicality','endurance']},
  s3:{id:'s3',phase:'style',t:'Who are you <em>traveling with?</em>',h:'',ty:'chips',opts:['Solo','Couple','Friends (3-6)','Family with kids','Large group (7+)'],w:'Company changes everything — restaurant types, activities, accommodation, pace.',tg:['social','companions']},
  s4:{id:'s4',phase:'style',t:'What <em>must not be missing?</em>',h:'Pick up to 5.',ty:'chips',opts:['Photography','Architecture','Live music','Local markets','Cooking class','Art & museums','Nightlife','Sports & outdoor','Shopping','Wellness / spa','Temples & sacred places','Wildlife & nature','Local artisan workshops','Neighborhood life (sit, watch, wander)','Nothing specific — surprise me'],multi:true,max:5,w:'Combinations paint a portrait. "Photography + Architecture + Neighborhood life" = visual flâneur.',tg:['interests','activities','portrait']},

  // === PRACTICAL (common) ===
  p1:{id:'p1',phase:'practical',t:'Where do you prefer to <em>sleep?</em>',h:'',ty:'chips',opts:['Hostel / Capsule (€0-30)','Budget but nice (€30-60)','Mid-comfort (€60-120)','Boutique / Design (€120-200)','Luxury (€200+)','Mix — save some nights, splurge others'],w:'The "Mix" option is the richest signal — flexibility and variety.',tg:['accommodation','budget']},
  p2:{id:'p2',phase:'practical',t:'What matters most in <em>accommodation?</em>',h:'Pick up to 3.',ty:'chips',opts:['Central location','Quiet area','Design / unique atmosphere','Pool','Kitchen available','Social vibe (common area)','View','Authenticity (riad, ryokan, local home)','Cleanliness above all'],multi:true,max:3,w:'Accommodation priorities correlate strongly with personality type.',tg:['accommodation','priorities']},
  p3:{id:'p3',phase:'practical',t:'How do you want to <em>eat?</em>',h:'',ty:'chips',opts:['Street food & markets (€5-15)','Budget local mix (€10-25)','Some good restaurants (€20-50)','Foodie — food IS the trip (€40+)','Mix — street food daily, one special dinner sometimes'],w:'"Mix" and "Foodie" trigger the food sub-question.',tg:['food','budget','style']},
  p4:{id:'p4',phase:'practical',t:'Any <em>dietary</em> restrictions?',h:'',ty:'chips',opts:['None — I eat everything','Vegetarian','Vegan','Gluten-free','Lactose-free','Halal','Kosher','Specific allergies'],multi:true,w:'Critical for every restaurant suggestion.',tg:['dietary','constraint']},
  p5:{id:'p5',phase:'practical',t:'How long and <em>when?</em>',h:'',ty:'chips',opts:['Long weekend (2-3 nights)','Short week (4-5)','Full week (6-7)','10-14 days','2-3 weeks','1 month+'],w:'Duration shapes itinerary depth and geographic scope.',tg:['duration','timing']},
  p6:{id:'p6',phase:'practical',t:'When are you <em>thinking?</em>',h:'',ty:'chips',opts:['Fixed dates','Flexible','Not sure yet'],w:'Flexible dates = LLM can suggest optimal timing.',tg:['timing','flexibility']},

  // === CONTEXT ===
  x1:{id:'x1',phase:'context',t:'How much do you usually <em>travel?</em>',h:'',ty:'chips',opts:['First time abroad','A few trips a year, well-known places','Travel often, including unconventional places','Constantly / digital nomad'],w:'Calibrates how bold the LLM can be with suggestions.',tg:['experience','calibration']},
  x2:{id:'x2',phase:'context',t:'Comfortable in places where they don\'t speak <em>your language?</em>',h:'',ty:'chips',opts:['Yes, I figure it out — part of the adventure','Prefer English or my language spoken','I manage but would love key phrases'],w:'Language comfort shapes destination viability.',tg:['language','comfort zone']},
  x3:{id:'x3',phase:'context',t:'Any <em>accessibility</em> needs?',h:'',ty:'chips',opts:['None','Reduced mobility','Wheelchair user','Other'],w:'Non-negotiable. Every activity checked for accessibility.',tg:['accessibility','safety']},
};

// === PATH SEQUENCES ===
const PATH_A = ['a1','a2','a3','a4','a5','a6'];
const PATH_B = ['b1','b2','b3','b4','b5','b6'];
const COMMON = ['s1','s2','s3','s4','p1','p2','p3','p4','p5','p6','x1','x2','x3'];

// === STATE ===
let path = null; // 'a' or 'b'
let seq = []; // current full sequence of question ids
let ci = -1; // -1 = split screen, 0+ = index in seq
let D = {}; // all answers: {questionId: value}
let imgSel = {}; // {questionId: [selected values]}
let chipSel = {}; // {questionId: [selected values]}
let busy = false;
const MR = ['Got it.','Interesting.','Noted.','That says a lot.','Good.','Telling.','Understood.'];

function init(){ renderSplit(); }

// === PROGRESS BAR ===
function buildTopBar(){
  const bar = document.getElementById('topBar'); bar.innerHTML = '';
  if(ci<0) return;
  const total = seq.length;
  // Show phase separators
  const pathLen = path==='a'?PATH_A.length:PATH_B.length;
  const phases = [pathLen, 4, 6, 3]; // 1a/1b, style, practical, context
  let idx = 0;
  phases.forEach((len,pi)=>{
    for(let i=0;i<len;i++){
      const seg = document.createElement('div'); seg.className='tp-seg';
      if(idx<ci) seg.classList.add('filled');
      if(idx===ci) seg.classList.add('current');
      bar.appendChild(seg); idx++;
    }
    if(pi<phases.length-1){const sep=document.createElement('div');sep.className='tp-sep';bar.appendChild(sep);}
  });
  const count = document.createElement('span'); count.className='tp-count';
  count.textContent=`${ci+1}/${total}`;
  bar.appendChild(count);
}

function buildVP(){
  const vp=document.getElementById('vp'); vp.innerHTML='';
  if(ci<0) return;
  const total=seq.length;
  // Show max ~16 dots, collapse if more
  const show = Math.min(total, 19);
  for(let i=0;i<show;i++){
    const step=document.createElement('div');step.className='vp-step';
    step.onclick=()=>{if(i<=ci)goTo(i);};
    const dot=document.createElement('div');dot.className='vp-dot';
    if(i===ci) dot.className+=' active';
    else if(i<ci) dot.className+=' done';
    else dot.className+=' wait';
    dot.textContent=i+1;
    step.appendChild(dot);
    if(i<show-1){const line=document.createElement('div');line.className='vp-line';if(i<ci)line.className+=' filled';step.appendChild(line);}
    vp.appendChild(step);
  }
}

// === SPLIT SCREEN ===
function renderSplit(){
  const a=document.getElementById('qA');
  a.innerHTML=`<div class="qc enter">
    <span class="q-label">✦ Let's begin</span>
    <h1 class="q-text">What kind of traveler are you <em>today?</em></h1>
    <p class="q-hint">This shapes everything that follows.</p>
    <div class="split">
      <div class="split-card" onclick="choosePath('a')">
        <div class="split-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#E94560" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3M12 17h.01"/></svg></div>
        <h3>I don't know where to go</h3>
        <p>We'll ask a few questions about who you are. Then we'll surprise you.</p>
      </div>
      <div class="split-card" onclick="choosePath('b')">
        <div class="split-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#E94560" stroke-width="2" stroke-linecap="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg></div>
        <h3>I already have an idea</h3>
        <p>Tell us where and how. We'll build the perfect trip.</p>
      </div>
    </div>
  </div>`;
  document.getElementById('topBar').innerHTML='';
  document.getElementById('vp').innerHTML='';
  document.getElementById('sb').innerHTML='';
}

function choosePath(p){
  path=p;
  D._path=p;
  seq = (p==='a'?PATH_A:PATH_B).concat(COMMON);
  ci=0;
  transition(()=>renderQ(ci));
}

// === RENDER QUESTION ===
function renderQ(i){
  const qid=seq[i], q=ALL_Q[qid], a=document.getElementById('qA');
  if(!q){console.error('No question for',qid);return;}
  const phaseLabel = {split:'',_1a:'Your identity','1a':'Your identity','1b':'Your direction',style:'Your style',practical:'Practical details',context:'About you'}[q.phase]||'';
  let html='';
  const cs=chipSel[qid]||[];
  const is=imgSel[qid]||[];

  if(q.ty==='text'){
    html=`<textarea class="q-ta" id="qI" placeholder="${q.ph||''}" rows="4">${D[qid]||''}</textarea><div class="ta-f"><span>${q.optional?'Optional — skip if nothing comes to mind':'Write what feels true'}</span></div>`;
  } else if(q.ty==='chips'){
    html=`<div class="chips">${q.opts.map(o=>`<div class="chip ${cs.includes(o)?'on':''}" data-v="${o}" onclick="cChip('${qid}',this,${!!q.multi},${q.max||99})">${o}</div>`).join('')}</div>`;
  } else if(q.ty==='images'){
    html=`<div class="imgs">${q.imgs.map(o=>`<div class="iopt ${is.includes(o.v)?'on':''}" data-v="${o.v}" onclick="cImg('${qid}',this,${q.max||1})"><img class="iopt-bg" src="${o.img}" alt="${o.l}" loading="eager"><div class="iopt-label">${o.l}<small>${o.sub}</small></div><div class="iopt-check"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"><path d="M5 12l5 5L20 7"/></svg></div></div>`).join('')}</div><div class="img-counter" id="imgCt">${is.length>0?`<span>${is.length}</span>/${q.max} selected`:`Select up to ${q.max}`}</div>`;
  } else if(q.ty==='slider'){
    const v=D[qid]||50;
    const idx=Math.round(v/100*(q.slVals.length-1));
    html=`<div class="sl-box"><div class="sl-labels"><span class="sl-label">${q.slLabels[0]}</span><span class="sl-label" style="text-align:right">${q.slLabels[1]}</span></div><div class="sl-track" id="sT"><div class="sl-fill" id="sF" style="width:${v}%"></div><div class="sl-thumb" id="sTh" style="left:${v}%"></div></div><div class="sl-notches" id="sN">${q.slVals.map((_,n)=>`<div class="sl-notch ${n<=idx?'on':''}"></div>`).join('')}</div><div class="sl-val" id="sV">${q.slVals[idx]}</div></div>`;
  } else if(q.ty==='input'){
    html=`<input class="q-input" id="qI" type="text" placeholder="${q.ph||''}" value="${D[qid]||''}">`;
  }

  const stepNum = String(i+1).padStart(2,'0');
  a.innerHTML=`<div class="qc enter">
    <div class="phase-tag">${phaseLabel}</div>
    <span class="q-label"><svg viewBox="0 0 24 24" fill="none" stroke="#E94560" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg> ${stepNum}</span>
    <h1 class="q-text">${q.t}</h1>
    ${q.h?`<p class="q-hint">${q.h}</p>`:''}
    ${html}
    <div class="btns">
      ${i>0||ci>0?`<button class="btn-b" onclick="goB()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>Back</button>`:'<div></div>'}
      <button class="btn-n" id="bN" onclick="goN()" ${needsInput(q,qid)?'disabled':''}>${i===seq.length-1?'See my destinations':'Continue'}<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg></button>
    </div>
  </div>`;

  buildVP(); buildTopBar(); buildSidebar(q,qid,i);

  if(q.ty==='text'||q.ty==='input'){const inp=document.getElementById('qI');setTimeout(()=>inp&&inp.focus(),250);inp.oninput=()=>{document.getElementById('bN').disabled=needsInput(q,qid,inp.value);};}
  if(q.ty==='slider') initSlider(qid,q);
}

function needsInput(q,qid,val){
  if(q.optional) return false;
  if(q.ty==='text') return !(val||D[qid]||'').trim();
  if(q.ty==='input') return !(val||D[qid]||'').trim();
  if(q.ty==='chips') return !(chipSel[qid]&&chipSel[qid].length);
  if(q.ty==='images') return !(imgSel[qid]&&imgSel[qid].length);
  return false;
}

// === INTERACTIONS ===
function cChip(qid,el,multi,max){
  if(!chipSel[qid]) chipSel[qid]=[];
  const v=el.dataset.v;
  if(multi){
    if(el.classList.contains('on')){
      el.classList.remove('on'); chipSel[qid]=chipSel[qid].filter(x=>x!==v);
    } else {
      if(chipSel[qid].length>=max){const first=document.querySelector(`.chip.on[data-v="${chipSel[qid][0]}"]`);if(first)first.classList.remove('on');chipSel[qid].shift();}
      el.classList.add('on'); chipSel[qid].push(v);
    }
  } else {
    document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));
    el.classList.add('on'); chipSel[qid]=[v];
  }
  D[qid]=chipSel[qid].join(', ');
  document.getElementById('bN').disabled=!chipSel[qid].length;
}

function cImg(qid,el,max){
  if(!imgSel[qid]) imgSel[qid]=[];
  const v=el.dataset.v;
  if(el.classList.contains('on')){
    el.classList.remove('on'); imgSel[qid]=imgSel[qid].filter(x=>x!==v);
  } else {
    if(imgSel[qid].length>=max){const oldest=document.querySelector(`.iopt.on[data-v="${imgSel[qid][0]}"]`);if(oldest)oldest.classList.remove('on');imgSel[qid].shift();}
    el.classList.add('on'); imgSel[qid].push(v);
  }
  const ct=document.getElementById('imgCt');
  if(ct) ct.innerHTML=imgSel[qid].length>0?`<span>${imgSel[qid].length}</span>/${max} selected`:`Select up to ${max}`;
  D[qid]=imgSel[qid].join(', ');
  document.getElementById('bN').disabled=!imgSel[qid].length;
}

function initSlider(qid,q){
  const tr=document.getElementById('sT'),fi=document.getElementById('sF'),th=document.getElementById('sTh'),vl=document.getElementById('sV'),no=document.getElementById('sN');
  let dragging=false;
  function upd(pct){const v=Math.max(0,Math.min(100,pct));fi.style.width=v+'%';th.style.left=v+'%';const idx=Math.round(v/100*(q.slVals.length-1));vl.textContent=q.slVals[idx];D[qid]=v;no.querySelectorAll('.sl-notch').forEach((n,ni)=>n.classList.toggle('on',ni<=idx));}
  function pos(e){const r=tr.getBoundingClientRect();const x=e.touches?e.touches[0].clientX:e.clientX;return((x-r.left)/r.width)*100;}
  th.onmousedown=()=>dragging=true;th.ontouchstart=()=>dragging=true;tr.onclick=e=>upd(pos(e));
  document.addEventListener('mousemove',e=>{if(dragging)upd(pos(e));});
  document.addEventListener('touchmove',e=>{if(dragging)upd(pos(e));});
  document.addEventListener('mouseup',()=>dragging=false);
  document.addEventListener('touchend',()=>dragging=false);
  if(!D[qid]) D[qid]=50;
}

// === SIDEBAR ===
function buildSidebar(q,qid,i){
  const sb=document.getElementById('sb');
  let prev='';
  const answered=seq.slice(0,i).filter(id=>D[id]);
  if(answered.length){
    prev=`<div style="margin-top:4px"><div style="font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:8px;opacity:.6">Your profile so far</div>`;
    answered.slice(-5).forEach((id,j)=>{
      const txt=D[id]||'';const short=txt.length>50?txt.substring(0,50)+'…':txt;
      const label=ALL_Q[id]?ALL_Q[id].tg[0]:'';
      prev+=`<div style="padding:8px 12px;background:var(--bg);border-radius:10px;margin-bottom:5px;font-size:11px;color:var(--text-secondary);line-height:1.5;font-weight:300;border-left:2px solid var(--accent);opacity:.5;overflow:hidden;max-height:44px"><b style="font-weight:500;color:var(--text);font-size:9px;letter-spacing:.5px;text-transform:uppercase;display:block;margin-bottom:1px">${label}</b>${short}</div>`;
    });
    prev+=`</div>`;
  }
  sb.innerHTML=`
    <div class="sc"><div class="sc-h"><svg viewBox="0 0 24 24" fill="none" stroke="#E94560" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3M12 17h.01"/></svg>Why this question?</div><p>${q.w}</p></div>
    <div class="sc"><div class="sc-h"><svg viewBox="0 0 24 24" fill="none" stroke="#E94560" stroke-width="2" stroke-linecap="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>What we're mapping</div><div class="mt">${q.tg.map(t=>`<span>${t}</span>`).join('')}</div></div>
    ${prev}
    <div class="sb-priv"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>Your answers shape your destinations. Never stored, never shared.</div>`;
}

// === NAVIGATION ===
function save(){
  const inp=document.getElementById('qI');
  if(inp) D[seq[ci]]=inp.value.trim();
}

function transition(cb){
  if(busy) return; busy=true;
  const qc=document.querySelector('.qc');
  if(qc){qc.classList.remove('enter');qc.classList.add('exit');}
  const m=document.getElementById('mic');m.textContent=MR[Math.floor(Math.random()*MR.length)];m.classList.remove('go');void m.offsetWidth;m.classList.add('go');
  setTimeout(()=>{cb();busy=false;},300);
}

function goN(){
  save();
  transition(()=>{
    if(ci<seq.length-1){ci++;renderQ(ci);}
    else showAnalyzing();
  });
}

function goB(){
  if(ci<=0){ci=-1;renderSplit();return;}
  save();transition(()=>{ci--;renderQ(ci);});
}

function goTo(i){if(i===ci)return;save();transition(()=>{ci=i;renderQ(ci);});}

function showAnalyzing(){
  const overlay=document.getElementById('analyzeOverlay');overlay.classList.add('show');
  const traits=['Deep explorer','Aesthetic-driven','Comfort-aware','Pattern breaker','Experience seeker','Emotionally calibrated'];
  const container=document.getElementById('analyzeTraits');container.innerHTML='';
  traits.forEach((t,i)=>setTimeout(()=>{const el=document.createElement('span');el.className='analyze-trait';el.style.animationDelay=i*0.15+'s';el.textContent=t;container.appendChild(el);},400+i*300));
  setTimeout(()=>{
    localStorage.setItem('mindroute_profile',JSON.stringify(D));
    localStorage.setItem('mindroute_chips',JSON.stringify(chipSel));
    localStorage.setItem('mindroute_imgs',JSON.stringify(imgSel));
    location.href='destinations.html';
  },3400);
}

document.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){const b=document.getElementById('bN');if(b&&!b.disabled){e.preventDefault();goN();}}});

init();
</script>
