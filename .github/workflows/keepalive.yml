name: keepalive

# Tiene "sveglia" l'istanza Render free/lite: pinga l'health endpoint ogni
# ~10 minuti così non scende sotto la soglia di inattività (15 min) che provoca
# il cold start da 30-60s al primo accesso (es. link aperto da TikTok/IG).
#
# URL configurabile: imposta la repo variable KEEPALIVE_URL
# (Settings → Secrets and variables → Actions → Variables) se usi un dominio
# custom; altrimenti usa di default https://mindroute.onrender.com/healthz.
#
# NB: le schedule di GitHub Actions possono ritardare di qualche minuto sotto
# carico e vengono disabilitate dopo 60 giorni di inattività della repo. Per un
# keep-alive davvero affidabile, in alternativa: cron-job.org / UptimeRobot
# (esterni, gratis) oppure il piano Render Starter (always-on, a pagamento).

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

# Evita run accavallati se uno è lento per un cold start.
concurrency:
  group: keepalive
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping health endpoint
        run: |
          URL="${{ vars.KEEPALIVE_URL }}"
          if [ -z "$URL" ]; then URL="https://mindroute.onrender.com/healthz"; fi
          echo "Pinging $URL"
          # Fino a 3 tentativi: se l'istanza era addormentata, il primo ping
          # avvia il cold start e i retry danno tempo di completarlo.
          for i in 1 2 3; do
            code=$(curl -fsS -o /dev/null -w "%{http_code}" --max-time 75 "$URL") \
              && { echo "ok: HTTP $code"; exit 0; }
            echo "tentativo $i fallito, riprovo tra 20s"; sleep 20
          done
          echo "keepalive ping fallito dopo 3 tentativi"; exit 1
